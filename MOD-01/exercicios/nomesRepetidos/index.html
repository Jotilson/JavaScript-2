<script>
    
    const Dados=[]

    function addPeople(){
        let texto="Domingos1"
     for(let letra of texto){
        if(!isNaN(letra)){
            console.log(`Isto é um número!`)
             break
        }else{
             console.log(`Isto não é um número!`)
            
        }
     }
    let v=1
       if(document.getElementById('nome').value!=0){
     Dados.push(
        {nome:document.getElementById('nome').value}
    )
             
    let total=Dados.length
    if(total>1){
       
        for(let i=0;i<total-1;i++){

               alert(`Este nome já foi registrado!`)
               v=0

            }else{

            } 
        }}
        if(v===1){
            
        Dados2.push(

    )

        }
    
    document.getElementById('nome').value=""
   
        }else{

        }

    function listarPeople(){
        const nomes=Dados2.map(us=>us.nome2+`\n`)
        document.getElementById('mostrar').textContent=nomes.join("\n")
    }

</script>
